<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1440, initial-scale=1.0">
  <title>By Razia</title>
  <link rel="stylesheet" href="https://use.typekit.net/ogu1wcx.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #B3CDE0;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    .canvas {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #B3CDE0;
      overflow: hidden;
      display: grid;
      grid-template-columns: 28% 44% 28%;
    }

    .title {
      font-size: 72px;
      font-weight: 500;
      font-family: 'auger-mono', monospace;
      color: #D72638;
      letter-spacing: -0.05em;
      line-height: 1;
      white-space: nowrap;
      margin: 0 0 1.5rem 0;
      opacity: 0;
      transform: translateX(-40px);
      animation: fromLeft 0.9s ease forwards;
      animation-delay: 500ms;
    }

    .desc {
      font-size: 13px;
      line-height: 1.7;
      color: #000;
      font-family: 'auger-mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      opacity: 0;
      transform: translateX(-40px);
      animation: fromLeft 0.9s ease forwards;
      animation-delay: 650ms;
    }

    .ball-label {
      font-family: 'auger-mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #2a3a4a;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
      text-align: center;
      margin-top: 10px;
      display: block;
    }

    .ball-label.show { opacity: 1; }

    @keyframes fromLeft {
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes dropBounce {
      0%   { opacity: 0; transform: translateY(-120%) rotate(-12deg); }
      55%  { opacity: 1; transform: translateY(6%) rotate(4deg); }
      72%  { transform: translateY(-3%) rotate(-2deg); }
      86%  { transform: translateY(3%) rotate(1deg); }
      100% { opacity: 1; transform: translateY(0) rotate(0deg); }
    }

    @keyframes stripOpen {
      0%   { opacity: 0; transform: scale(0.1) rotate(-8deg); }
      50%  { opacity: 1; transform: scale(1.03) rotate(1deg); }
      75%  { transform: scale(0.98) rotate(-0.5deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    .left-panel {
      position: relative;
      padding: 3rem 2rem 2rem 3rem;
      display: flex;
      flex-direction: column;
      z-index: 2;
    }

    .ball-zone {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: visible;
      z-index: 1;
    }

    .right-panel {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: visible;
      z-index: 1;
    }

    .pball {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      filter: drop-shadow(0px 18px 12px rgba(0,0,0,0.28));
    }

    .pball.drop {
      animation: dropBounce 1s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
    }

    .pmidway {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.3s ease;
      filter: drop-shadow(0px 14px 10px rgba(0,0,0,0.22));
    }

    .grain {
      pointer-events: none;
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      opacity: 0.18;
    }

    .paper-scene {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .paper-scene.open { display: flex; }

    .paper-sheet {
      position: relative;
      width: 88vw;
      height: 76vh;
      background-image: url('Brown paper.jpg');
      background-size: cover;
      background-position: center;
      border-radius: 12px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.35);
      animation: stripOpen 0.65s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
      opacity: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-bottom: 80px;
      box-sizing: border-box;
    }

    /* viewport */
    .paper-viewport {
      width: 90%;
      height: 82%;
      overflow: hidden;
      position: relative;
    }

    .paper-track {
      display: flex;
      height: 100%;
      transition: transform 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
      gap: 24px;
      align-items: center;
    }

    /* each slide: image on left, info on right */
    .paper-slide {
      flex: 0 0 72%;
      height: 90%;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 20px;
      opacity: 0.35;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .paper-slide.active {
      opacity: 1;
      pointer-events: all;
    }

    /* image portion */
    .slide-img-wrap {
      flex: 0 0 auto;
      height: 100%;
      display: flex;
      align-items: center;
    }

    .slide-img-wrap img {
      height: 100%;
      width: auto;
      max-width: 340px;
      object-fit: contain;
      border-radius: 6px;
      display: block;
      cursor: pointer;
      box-shadow: 0 12px 40px rgba(0,0,0,0.25), 0 4px 12px rgba(0,0,0,0.15);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .slide-img-wrap img:hover {
      transform: scale(1.02);
      box-shadow: 0 18px 50px rgba(0,0,0,0.3), 0 6px 16px rgba(0,0,0,0.18);
    }

    /* info portion — to the right of image */
    .slide-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .slide-title {
      font-family: 'auger-mono', monospace;
      font-size: 16px;
      font-weight: 500;
      color: #2a1a0a;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 1.3;
    }

    .slide-action {
      font-family: 'auger-mono', monospace;
      font-size: 11px;
      color: #7a4a20;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border: 1px solid rgba(122,74,32,0.4);
      border-radius: 20px;
      background: rgba(255,255,255,0.35);
      transition: background 0.2s ease, border-color 0.2s ease;
      width: fit-content;
    }

    .slide-action:hover {
      background: rgba(255,255,255,0.65);
      border-color: rgba(122,74,32,0.7);
    }

    .slide-action::before {
      content: '→';
      font-size: 12px;
    }

    /* arrows — below the viewport */
    .carousel-nav {
      position: absolute;
      bottom: 3%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .nav-arrow {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(255,255,255,0.8);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease, transform 0.15s ease;
      box-shadow: 0 2px 12px rgba(0,0,0,0.14);
    }

    .nav-arrow:hover {
      background: rgba(255,255,255,0.98);
      transform: scale(1.08);
    }

    .nav-arrow:active { transform: scale(0.95); }

    .nav-arrow svg {
      width: 16px;
      height: 16px;
      stroke: #2a1a0a;
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .slide-counter {
      font-family: 'auger-mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: #5a3a1a;
      opacity: 0.7;
      min-width: 36px;
      text-align: center;
    }

    .paper-close {
      position: absolute;
      top: 14px;
      right: 18px;
      font-family: 'auger-mono', monospace;
      font-size: 11px;
      color: #3a2010;
      letter-spacing: 0.1em;
      cursor: pointer;
      background: none;
      border: none;
      opacity: 0.6;
      z-index: 10;
      transition: opacity 0.2s ease;
    }

    .paper-close:hover { opacity: 1; }

    /* PDF fullscreen */
    .pdf-viewer {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }

    .pdf-viewer.open { display: flex; }

    .pdf-viewer iframe {
      width: 90vw;
      height: 92vh;
      border: none;
      border-radius: 4px;
    }

    .pdf-viewer-close {
      position: absolute;
      top: 20px;
      right: 24px;
      font-family: 'auger-mono', monospace;
      font-size: 13px;
      color: #fff;
      letter-spacing: 0.1em;
      cursor: pointer;
      background: none;
      border: none;
      opacity: 0.7;
      transition: opacity 0.2s ease;
    }

    .pdf-viewer-close:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="canvas">

    <div class="left-panel">
      <h1 class="title">BY RAZIA</h1>
      <p class="desc">
        RADHIA ADAM IS AN ARTIST,<br>
        DESIGNER AND CAMERA GIRL,<br>
        BASED IN WASHINGTON<br>
        D.C. BORN IN TANZANIA.
      </p>
      <div style="position:absolute; bottom:18%; left:50%; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center;">
        <div id="designHit" style="position:relative; width:160px; height:160px; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:6;">
          <img id="designBall" class="pball" src="paper_ball_graphic.png" alt="design ball" style="width:160px; position:absolute;"/>
          <img id="designMid" class="pmidway" src="mid_way_paper_ball.png" alt="midway" style="width:160px; position:absolute; transform:scale(0.3) rotate(15deg);"/>
        </div>
        <span class="ball-label" id="designLabel">Design</span>
      </div>
    </div>

    <div class="ball-zone">
      <div id="videoHitWrap" style="position:relative; width:300px; height:300px; display:flex; align-items:center; justify-content:center; cursor:pointer;">
        <img id="videoBall" class="pball" src="paper_ball_graphic.png" alt="video ball" style="width:100%;"/>
        <img id="videoMid" class="pmidway" src="mid_way_paper_ball.png" alt="midway" style="width:100%; transform:scale(0.3) rotate(15deg);"/>
      </div>
      <span class="ball-label" id="videoLabel">Video</span>
    </div>

    <div class="right-panel">
      <div id="photoHitWrap" style="position:relative; width:120px; height:120px; display:flex; align-items:center; justify-content:center; cursor:pointer;">
        <img id="photoBall" class="pball" src="paper_ball_graphic.png" alt="photo ball" style="width:120px;"/>
        <img id="photoMid" class="pmidway" src="mid_way_paper_ball.png" alt="midway" style="width:120px; transform:scale(0.3) rotate(15deg);"/>
      </div>
      <span class="ball-label" id="photoLabel">Photo</span>
    </div>

    <canvas class="grain"></canvas>
  </div>

  <!-- Paper scene -->
  <div class="paper-scene" id="paperScene">
    <div class="paper-sheet">
      <button class="paper-close" id="paperClose">✕ CLOSE</button>

      <div class="paper-viewport">
        <div class="paper-track" id="paperTrack"></div>
      </div>

      <div class="carousel-nav">
        <button class="nav-arrow" id="navPrev">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="slide-counter" id="slideCounter">1 / 1</span>
        <button class="nav-arrow" id="navNext">
          <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- PDF fullscreen -->
  <div class="pdf-viewer" id="pdfViewer">
    <button class="pdf-viewer-close" id="pdfViewerClose">✕ CLOSE</button>
    <iframe id="pdfFrame" src="" title="PDF viewer"></iframe>
  </div>

  <script>
    const scene     = document.getElementById('paperScene');
    const track     = document.getElementById('paperTrack');
    const closeBtn  = document.getElementById('paperClose');
    const counter   = document.getElementById('slideCounter');
    const pdfViewer = document.getElementById('pdfViewer');
    const pdfFrame  = document.getElementById('pdfFrame');
    const pdfVClose = document.getElementById('pdfViewerClose');

    let currentOpen  = null;
    let currentSlide = 0;
    let slides       = [];

    const content = {
      video: [
        { type: 'video', src: 'index.html/Kamala Rally.mp4',            title: 'Kamala Rally',           action: null },
        { type: 'video', src: 'index.html/Zanzibari Bridal Shower.mp4', title: 'Zanzibari Bridal Shower', action: null },
      ],
      design: [
        {
          type: 'pdf-preview',
          preview: 'Screenshot_2026-02-26_at_12_54_30_PM.png',
          pdf: 'Africans Map DC.pdf',
          title: 'Africans in the District',
          action: 'Click to open full print'
        },
        {
          type: 'link',
          preview: 'Screenshot 2026-04-28 at 5.10.43 PM.png',
          href: 'https://adamradhia1.github.io/HW-2-Game-Design/',
          title: 'Ghost Runner',
          action: 'Click to play game'
        },
      ],
      photo: [
        { type: 'image', src: 'IMAGE OF ME.png', title: 'Portrait', action: null },
      ]
    };

    function setActiveSlide() {
      document.querySelectorAll('.paper-slide').forEach((s, i) => {
        s.classList.toggle('active', i === currentSlide);
      });
      counter.textContent = (currentSlide + 1) + ' / ' + slides.length;
    }

    function goTo(idx) {
      currentSlide = Math.max(0, Math.min(idx, slides.length - 1));
      const slideWidth = track.parentElement.offsetWidth * 0.72 + 24;
      track.style.transform = `translateX(-${currentSlide * slideWidth}px)`;
      setActiveSlide();
      track.querySelectorAll('video').forEach((v, i) => {
        if (i === currentSlide) v.play().catch(() => {});
        else v.pause();
      });
    }

    function buildSlides(name) {
      slides = content[name];
      currentSlide = 0;
      track.innerHTML = '';
      track.style.transform = 'translateX(0)';

      slides.forEach((item, idx) => {
        const slide = document.createElement('div');
        slide.className = 'paper-slide' + (idx === 0 ? ' active' : '');

        if (item.type === 'video') {
          // video slides: full width video
          slide.style.flexBasis = '72%';
          const vid = document.createElement('video');
          vid.controls = true;
          vid.style.cssText = 'width:100%; height:100%; object-fit:cover; border-radius:8px; box-shadow:0 12px 40px rgba(0,0,0,0.25);';
          vid.innerHTML = `<source src="${item.src}" type="video/mp4"/>`;
          slide.appendChild(vid);

        } else {
          // image/pdf/link slides: image left + info right
          const imgWrap = document.createElement('div');
          imgWrap.className = 'slide-img-wrap';

          const img = document.createElement('img');
          img.src = item.preview || item.src;
          img.alt = item.title;

          if (item.type === 'pdf-preview') {
            img.addEventListener('click', () => {
              pdfFrame.src = item.pdf + '#toolbar=0&navpanes=0';
              pdfViewer.classList.add('open');
            });
          } else if (item.type === 'link') {
            img.addEventListener('click', () => window.open(item.href, '_blank'));
          }

          imgWrap.appendChild(img);
          slide.appendChild(imgWrap);

          // info panel
          if (item.title || item.action) {
            const info = document.createElement('div');
            info.className = 'slide-info';

            if (item.title) {
              const t = document.createElement('div');
              t.className = 'slide-title';
              t.textContent = item.title;
              info.appendChild(t);
            }

            if (item.action) {
              const a = document.createElement('div');
              a.className = 'slide-action';
              a.textContent = item.action;
              if (item.type === 'pdf-preview') {
                a.addEventListener('click', () => {
                  pdfFrame.src = item.pdf + '#toolbar=0&navpanes=0';
                  pdfViewer.classList.add('open');
                });
              } else if (item.type === 'link') {
                a.addEventListener('click', () => window.open(item.href, '_blank'));
              }
              info.appendChild(a);
            }

            slide.appendChild(info);
          }
        }

        track.appendChild(slide);
      });

      setActiveSlide();
    }

    function openScene(name) {
      if (currentOpen && currentOpen !== name) closeScene();
      currentOpen = name;
      buildSlides(name);
      scene.classList.add('open');
    }

    function closeScene() {
      scene.classList.remove('open');
      track.querySelectorAll('video').forEach(v => v.pause());
      currentOpen = null;
    }

    document.getElementById('navPrev').addEventListener('click', () => goTo(currentSlide - 1));
    document.getElementById('navNext').addEventListener('click', () => goTo(currentSlide + 1));
    closeBtn.addEventListener('click', closeScene);

    pdfVClose.addEventListener('click', () => { pdfViewer.classList.remove('open'); pdfFrame.src = ''; });
    pdfViewer.addEventListener('click', (e) => {
      if (e.target === pdfViewer) { pdfViewer.classList.remove('open'); pdfFrame.src = ''; }
    });

    const balls = {
      design: { ball: document.getElementById('designBall'), mid: document.getElementById('designMid'), hit: document.getElementById('designHit'),    label: document.getElementById('designLabel'), delay: 1600 },
      video:  { ball: document.getElementById('videoBall'),  mid: document.getElementById('videoMid'),  hit: document.getElementById('videoHitWrap'), label: document.getElementById('videoLabel'),  delay: 2000 },
      photo:  { ball: document.getElementById('photoBall'),  mid: document.getElementById('photoMid'),  hit: document.getElementById('photoHitWrap'), label: document.getElementById('photoLabel'),  delay: 2400 },
    };

    Object.entries(balls).forEach(([name, b]) => {
      setTimeout(() => {
        b.ball.classList.add('drop');
        setTimeout(() => b.label.classList.add('show'), 900);
        new Audio('Paper Ball drop.wav').play().catch(() => {});
      }, b.delay);

      b.hit.addEventListener('click', () => {
        if (currentOpen === name) {
          closeScene();
          b.ball.style.opacity = '0';
          b.ball.classList.remove('drop');
          setTimeout(() => {
            b.ball.classList.add('drop');
            b.label.classList.add('show');
            new Audio('Paper Ball drop.wav').play().catch(() => {});
          }, 80);
        } else {
          b.label.classList.remove('show');
          new Audio('paper ball sound.mp3').play().catch(() => {});
          setTimeout(() => {
            b.ball.style.opacity = '0';
            b.mid.style.opacity = '1';
            b.mid.style.transform = 'scale(1) rotate(-5deg)';
          }, 200);
          setTimeout(() => {
            b.mid.style.opacity = '0';
            openScene(name);
          }, 500);
        }
      });
    });

    function drawGrain() {
      const canvas = document.querySelector('.grain');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const w = canvas.width  = canvas.offsetWidth;
      const h = canvas.height = canvas.offsetHeight;
      const grainSize = 2;
      for (let y = 0; y < h; y += grainSize) {
        for (let x = 0; x < w; x += grainSize) {
          const tone = 180 + Math.floor(Math.random() * 75);
          ctx.fillStyle = `rgba(${tone},${tone},${tone},0.25)`;
          ctx.fillRect(x, y, grainSize, grainSize);
        }
      }
    }
    window.addEventListener('DOMContentLoaded', drawGrain);
    window.addEventListener('resize', drawGrain);
  </script>
</body>
</html>
