<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>By Razia</title>
  <link rel="stylesheet" href="https://use.typekit.net/ogu1wcx.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #B3CDE0;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    .canvas {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #B3CDE0;
      overflow: hidden;
    }

    .title {
      font-size: 72px;
      font-weight: 500;
      font-family: 'auger-mono', monospace;
      color: #D72638;
      letter-spacing: -0.05em;
      line-height: 1;
      white-space: nowrap;
      margin: 0 0 1.5rem 0;
      opacity: 0;
      transform: translateX(-40px);
      animation: fromLeft 0.9s ease forwards;
      animation-delay: 500ms;
    }

    .desc {
      font-size: 13px;
      line-height: 1.7;
      color: #000;
      font-family: 'auger-mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      opacity: 0;
      transform: translateX(-40px);
      animation: fromLeft 0.9s ease forwards;
      animation-delay: 650ms;
    }

    .ball-label {
      font-family: 'auger-mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #2a3a4a;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
      text-align: center;
      margin-top: 10px;
      display: block;
    }

    .ball-label.show { opacity: 1; }

    @keyframes fromLeft {
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes dropBounce {
      0%   { opacity: 0; transform: translateY(-120%) rotate(-12deg); }
      55%  { opacity: 1; transform: translateY(6%) rotate(4deg); }
      72%  { transform: translateY(-3%) rotate(-2deg); }
      86%  { transform: translateY(3%) rotate(1deg); }
      100% { opacity: 1; transform: translateY(0) rotate(0deg); }
    }

    @keyframes dropBounceTilted {
      0%   { opacity: 0; transform: translateY(-120%) rotate(-22deg); }
      55%  { opacity: 1; transform: translateY(6%) rotate(-10deg); }
      72%  { transform: translateY(-3%) rotate(-16deg); }
      86%  { transform: translateY(3%) rotate(-13deg); }
      100% { opacity: 1; transform: translateY(0) rotate(-15deg); }
    }

    @keyframes stripOpen {
      0%   { opacity: 0; transform: scale(0.1) rotate(-8deg); }
      50%  { opacity: 1; transform: scale(1.03) rotate(1deg); }
      75%  { transform: scale(0.98) rotate(-0.5deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    @keyframes swingOpen {
      0%   { opacity: 0; transform: rotate(-15deg) scale(0.85); transform-origin: top center; }
      55%  { transform: rotate(4deg) scale(1.02); transform-origin: top center; }
      75%  { transform: rotate(-2deg) scale(0.99); transform-origin: top center; }
      100% { opacity: 1; transform: rotate(0deg) scale(1); transform-origin: top center; }
    }

    @keyframes swingClose {
      0%   { opacity: 1; transform: rotate(0deg) scale(1); }
      100% { opacity: 0; transform: rotate(15deg) scale(0.8); }
    }

    .left-panel {
      position: absolute;
      top: 0;
      left: 0;
      padding: 3rem 2rem 2rem 3rem;
      display: flex;
      flex-direction: column;
      z-index: 2;
    }

    .pball {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      filter: drop-shadow(0px 18px 12px rgba(0,0,0,0.28));
    }

    .pball.drop {
      animation: dropBounce 1s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
    }

    .pmidway {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.3s ease;
      filter: drop-shadow(0px 14px 10px rgba(0,0,0,0.22));
    }

    .grain {
      pointer-events: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 9999;
      opacity: 0.22;
    }

    .polaroid-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 99999;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(0,0,0,0.35);
    }
    .polaroid-modal.open { display: flex; }

    .polaroid-modal-inner {
      position: relative;
      animation: swingOpen 0.7s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
    }

    .polaroid-modal-inner img {
      max-width: 72vw;
      max-height: 82vh;
      display: block;
      border-radius: 4px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.5);
    }

    .polaroid-modal-close {
      position: absolute;
      top: -36px;
      right: 0;
      font-family: 'auger-mono', monospace;
      font-size: 11px;
      color: #fff;
      letter-spacing: 0.1em;
      cursor: pointer;
      background: none;
      border: none;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .polaroid-modal-close:hover { opacity: 1; }

    .paper-scene {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .paper-scene.open { display: flex; }

    .paper-sheet {
      position: relative;
      width: 88vw;
      height: 76vh;
      background-image: url('Brown paper.jpg');
      background-size: cover;
      background-position: center;
      border-radius: 12px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.35);
      animation: stripOpen 0.65s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
      opacity: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-bottom: 80px;
      box-sizing: border-box;
    }

    .paper-viewport {
      width: 90%;
      height: 82%;
      overflow: hidden;
      position: relative;
    }

    .paper-track {
      display: flex;
      height: 100%;
      transition: transform 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
      gap: 24px;
      align-items: center;
    }

    .paper-slide {
      flex: 0 0 72%;
      height: 90%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      opacity: 0.35;
      transition: opacity 0.4s ease;
      pointer-events: none;
      position: relative;
    }

    .paper-slide.active {
      opacity: 1;
      pointer-events: all;
    }

    .slide-img-wrap {
      flex: 0 0 auto;
      height: 85%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slide-img-wrap img {
      height: 100%;
      width: auto;
      max-width: 340px;
      object-fit: contain;
      border-radius: 6px;
      display: block;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .slide-img-wrap img:hover { transform: scale(1.02); }

    .slide-caption {
      font-family: 'auger-mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #3a2010;
      opacity: 0.75;
      text-align: center;
      flex-shrink: 0;
    }

    .polaroid-hidden {
      opacity: 0 !important;
      pointer-events: none !important;
    }

    .slide-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .slide-title {
      font-family: 'auger-mono', monospace;
      font-size: 16px;
      font-weight: 500;
      color: #2a1a0a;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 1.3;
    }

    .slide-action {
      font-family: 'auger-mono', monospace;
      font-size: 11px;
      color: #7a4a20;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border: 1px solid rgba(122,74,32,0.4);
      border-radius: 20px;
      background: rgba(255,255,255,0.35);
      transition: background 0.2s ease, border-color 0.2s ease;
      width: fit-content;
    }

    .slide-action:hover {
      background: rgba(255,255,255,0.65);
      border-color: rgba(122,74,32,0.7);
    }

    .slide-action::before {
      content: '→';
      font-size: 12px;
    }

    .coming-soon {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      gap: 16px;
    }

    .coming-soon-text {
      font-family: 'auger-mono', monospace;
      font-size: 18px;
      color: #5a3a1a;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.6;
    }

    .coming-soon-sub {
      font-family: 'auger-mono', monospace;
      font-size: 11px;
      color: #7a5a3a;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.45;
    }

    .carousel-nav {
      position: absolute;
      bottom: 3%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .nav-arrow {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(255,255,255,0.8);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease, transform 0.15s ease;
      box-shadow: 0 2px 12px rgba(0,0,0,0.14);
    }

    .nav-arrow:hover {
      background: rgba(255,255,255,0.98);
      transform: scale(1.08);
    }

    .nav-arrow:active { transform: scale(0.95); }

    .nav-arrow svg {
      width: 16px;
      height: 16px;
      stroke: #2a1a0a;
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .slide-counter {
      font-family: 'auger-mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: #5a3a1a;
      opacity: 0.7;
      min-width: 36px;
      text-align: center;
    }

    .paper-close {
      position: absolute;
      top: 14px;
      right: 18px;
      font-family: 'auger-mono', monospace;
      font-size: 11px;
      color: #3a2010;
      letter-spacing: 0.1em;
      cursor: pointer;
      background: none;
      border: none;
      opacity: 0.6;
      z-index: 10;
      transition: opacity 0.2s ease;
    }

    .paper-close:hover { opacity: 1; }

    .series-back {
      position: absolute;
      top: 14px;
      left: 18px;
      font-family: 'auger-mono', monospace;
      font-size: 11px;
      color: #3a2010;
      letter-spacing: 0.1em;
      cursor: pointer;
      background: none;
      border: none;
      opacity: 0.6;
      z-index: 10;
      transition: opacity 0.2s ease;
    }
    .series-back:hover { opacity: 1; }

    .pdf-viewer {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }

    .pdf-viewer.open { display: flex; }

    .pdf-viewer iframe {
      width: 90vw;
      height: 92vh;
      border: none;
      border-radius: 4px;
    }

    .pdf-viewer-close {
      position: absolute;
      top: 20px;
      right: 24px;
      font-family: 'auger-mono', monospace;
      font-size: 13px;
      color: #fff;
      letter-spacing: 0.1em;
      cursor: pointer;
      background: none;
      border: none;
      opacity: 0.7;
      transition: opacity 0.2s ease;
    }

    .pdf-viewer-close:hover { opacity: 1; }

    /* ── MOBILE STYLES ── */
    @media (max-width: 768px) {

      .left-panel {
        padding: 1.8rem 1.2rem 1rem 1.4rem;
      }

      .title {
        font-size: 38px;
        white-space: normal;
      }

      .desc {
        font-size: 10px;
        line-height: 1.6;
      }

      /* Design ball: top left */
      #designWrap {
        left: 5% !important;
        top: 36% !important;
      }

      #designWrap #designHit {
        width: 100px !important;
        height: 100px !important;
      }

      #designBall { width: 100px !important; }
      #designMid  { width: 100px !important; }

      /* Video ball: bottom center — largest */
      #videoWrap {
        left: 50% !important;
        top: 62% !important;
        transform: translateX(-50%);
      }

      #videoWrap #videoHitWrap {
        width: 180px !important;
        height: 180px !important;
      }

      #videoBall { width: 100% !important; }
      #videoMid  { width: 100% !important; }

      /* Photo ball: top right */
      #photoWrap {
        left: auto !important;
        right: 5% !important;
        top: 36% !important;
      }

      #photoWrap #photoHitWrap {
        width: 80px !important;
        height: 80px !important;
      }

      #photoBall { width: 80px !important; }
      #photoMid  { width: 80px !important; }

      /* Pen decoration — hide on mobile */
      #penDeco { display: none !important; }

      /* White balls — smaller on mobile */
      #whiteBallSmall { width: 6% !important; }
      #whiteBallLarge { width: 14% !important; }

      /* Polaroid — reposition for mobile */
      #polaroid {
        left: 2% !important;
        top: 72% !important;
        width: 28% !important;
      }

      /* Paper sheet — full screen on mobile */
      .paper-sheet {
        width: 96vw !important;
        height: 88vh !important;
        padding-bottom: 70px !important;
      }

      .paper-viewport {
        width: 95% !important;
        height: 78% !important;
      }

      /* Slides wider on mobile */
      .paper-slide {
        flex: 0 0 88% !important;
      }

      /* Nav arrows bigger for touch */
      .nav-arrow {
        width: 52px !important;
        height: 52px !important;
      }

      .nav-arrow svg {
        width: 20px !important;
        height: 20px !important;
      }

      /* PDF viewer full screen */
      .pdf-viewer iframe {
        width: 98vw !important;
        height: 88vh !important;
      }

      /* Lightbox full screen */
      #lightboxImg {
        max-width: 96vw !important;
        max-height: 80vh !important;
      }

      /* Polaroid modal */
      .polaroid-modal-inner img {
        max-width: 90vw !important;
        max-height: 80vh !important;
      }

      .ball-label {
        font-size: 9px !important;
      }
    }
  </style>
</head>
<body>
  <div class="canvas">

    <div class="left-panel">
      <h1 class="title">BY RAZIA</h1>
      <p class="desc">
        RADHIA ADAM IS AN ARTIST,<br>
        DESIGNER AND CAMERA GIRL,<br>
        BASED IN WASHINGTON<br>
        D.C. BORN IN TANZANIA.
      </p>
    </div>

    <img id="penDeco" src="pen.png" aria-hidden="true"
      style="position:absolute; left:30%; top:-50%; width:72%; transform:rotate(-7deg); transform-origin:center center; pointer-events:auto; z-index:4; cursor:grab; opacity:0; animation:fadeIn 0.9s ease forwards; animation-delay:1400ms; filter: drop-shadow(4px 16px 10px rgba(0,0,0,0.30));">

    <div id="designWrap" style="position:absolute; left:11%; top:52%; display:flex; flex-direction:column; align-items:center; z-index:6; cursor:pointer; user-select:none;">
      <div id="designHit" style="position:relative; width:160px; height:160px; display:flex; align-items:center; justify-content:center;">
        <img id="designBall" class="pball" src="paper_ball_graphic.png" alt="design ball" style="width:160px; position:absolute;"/>
        <img id="designMid" class="pmidway" src="mid_way_paper_ball.png" alt="midway" style="width:160px; position:absolute; transform:scale(0.3) rotate(15deg);"/>
      </div>
      <span class="ball-label" id="designLabel">Design</span>
    </div>

    <img id="whiteBallSmall" src="White paper ball.png" aria-hidden="true"
      style="position:absolute; left:23%; top:56%; width:4%; pointer-events:auto; z-index:5; cursor:grab; opacity:0; animation:dropBounce 1s cubic-bezier(0.34,1.2,0.64,1) forwards; animation-delay:1800ms; filter: drop-shadow(2px 8px 6px rgba(0,0,0,0.28));">

    <div id="videoWrap" style="position:absolute; left:44%; top:35%; display:flex; flex-direction:column; align-items:center; z-index:6; cursor:pointer; user-select:none;">
      <div id="videoHitWrap" style="position:relative; width:300px; height:300px; display:flex; align-items:center; justify-content:center;">
        <img id="videoBall" class="pball" src="paper_ball_graphic.png" alt="video ball" style="width:100%;"/>
        <img id="videoMid" class="pmidway" src="mid_way_paper_ball.png" alt="midway" style="width:100%; transform:scale(0.3) rotate(15deg);"/>
      </div>
      <span class="ball-label" id="videoLabel">Video</span>
    </div>

    <div id="photoWrap" style="position:absolute; left:76%; top:38%; display:flex; flex-direction:column; align-items:center; z-index:6; cursor:pointer; user-select:none;">
      <div id="photoHitWrap" style="position:relative; width:120px; height:120px; display:flex; align-items:center; justify-content:center;">
        <img id="photoBall" class="pball" src="paper_ball_graphic.png" alt="photo ball" style="width:120px;"/>
        <img id="photoMid" class="pmidway" src="mid_way_paper_ball.png" alt="midway" style="width:120px; transform:scale(0.3) rotate(15deg);"/>
      </div>
      <span class="ball-label" id="photoLabel">Photo</span>
    </div>

    <img id="whiteBallLarge" src="White paper ball.png" aria-hidden="true"
      style="position:absolute; left:68%; top:66%; width:10%; pointer-events:auto; z-index:5; cursor:grab; opacity:0; animation:dropBounce 1s cubic-bezier(0.34,1.2,0.64,1) forwards; animation-delay:2200ms; filter: drop-shadow(4px 16px 12px rgba(0,0,0,0.30));">

  </div>

  <canvas class="grain"></canvas>

  <img id="polaroid" src="MY IMAGE.png" alt="polaroid"
    style="position:fixed; left:26%; top:66%; width:18%; transform-origin:center top; pointer-events:auto; z-index:10001; cursor:pointer; opacity:0; animation:dropBounceTilted 1s cubic-bezier(0.34,1.2,0.64,1) forwards; animation-delay:2600ms; filter: drop-shadow(4px 20px 16px rgba(0,0,0,0.40));">

  <div class="polaroid-modal" id="polaroidModal">
    <div class="polaroid-modal-inner" id="polaroidInner" style="position:relative;">
      <button class="polaroid-modal-close" id="polaroidClose">✕ CLOSE</button>
      <img src="IMAGE OF ME 2.png" alt="Portrait" style="display:block;">
      <a href="mailto:adamradhia1@gmail.com" title="Email Radhia"
         style="position:absolute; bottom:9%; left:18%; right:5%; height:9%; cursor:pointer; display:block; border-radius:4px;"
         onmouseover="this.style.background='rgba(215,38,56,0.08)'"
         onmouseout="this.style.background='transparent'">
      </a>
    </div>
  </div>

  <div id="photoLightbox" style="display:none; position:fixed; inset:0; background:rgba(180,200,220,0.18); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px); z-index:99998; align-items:center; justify-content:center;">
    <button id="lbPrev" style="position:absolute; left:24px; top:50%; transform:translateY(-50%); width:48px; height:48px; border-radius:50%; background:rgba(255,255,255,0.55); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.2s; backdrop-filter:blur(8px);">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <img id="lightboxImg" src="" alt="" style="max-width:82vw; max-height:88vh; object-fit:contain; border-radius:12px; box-shadow:0 30px 80px rgba(0,0,0,0.25); display:block;">
    <button id="lbNext" style="position:absolute; right:24px; top:50%; transform:translateY(-50%); width:48px; height:48px; border-radius:50%; background:rgba(255,255,255,0.55); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.2s; backdrop-filter:blur(8px);">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <button id="lightboxClose" style="position:absolute; top:20px; right:24px; font-family:'auger-mono',monospace; font-size:13px; color:#1a1a1a; letter-spacing:0.1em; cursor:pointer; background:rgba(255,255,255,0.55); border:none; padding:6px 12px; border-radius:20px; opacity:0.85; transition:opacity 0.2s; backdrop-filter:blur(8px);">✕ CLOSE</button>
    <span id="lbCounter" style="position:absolute; bottom:20px; left:50%; transform:translateX(-50%); font-family:'auger-mono',monospace; font-size:11px; color:#1a1a1a; letter-spacing:0.1em; opacity:0.6;"></span>
  </div>

  <canvas id="drawCanvas" style="position:fixed; inset:0; z-index:199999; pointer-events:none; cursor:crosshair;"></canvas>

  <div class="paper-scene" id="paperScene">
    <div class="paper-sheet">
      <button class="paper-close" id="paperClose">✕ CLOSE</button>
      <button class="series-back" id="seriesBack" style="display:none;">← BACK</button>
      <div class="paper-viewport">
        <div class="paper-track" id="paperTrack"></div>
      </div>
      <div class="carousel-nav">
        <button class="nav-arrow" id="navPrev">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="slide-counter" id="slideCounter">1 / 1</span>
        <button class="nav-arrow" id="navNext">
          <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="pdf-viewer" id="pdfViewer">
    <button class="pdf-viewer-close" id="pdfViewerClose">✕ CLOSE</button>
    <iframe id="pdfFrame" src="" title="PDF viewer"></iframe>
  </div>

  <script>
    const scene     = document.getElementById('paperScene');
    const track     = document.getElementById('paperTrack');
    const closeBtn  = document.getElementById('paperClose');
    const counter   = document.getElementById('slideCounter');

    function setActiveSlide() {
      document.querySelectorAll('.paper-slide').forEach((s, i) => {

    function centeredOffset(idx) {
      const vpW = track.parentElement.offsetWidth;
      const slideW = vpW * 0.72 + 24;
      const initial = (vpW - vpW * 0.72) / 2;
      return initial - idx * slideW;
    }

    function goTo(idx) {
      currentSlide = Math.max(0, Math.min(idx, slides.length - 1));
      track.style.transform = `translateX(${centeredOffset(currentSlide)}px)`;
      setActiveSlide();
      track.querySelectorAll('video').forEach((v, i) => {
        if (i === currentSlide) v.play().catch(() => {});
        else v.pause();
      });
    }

    const seriesBackBtn = document.getElementById('seriesBack');

    function buildSeriesCovers(seriesArray) {

          wrap.appendChild(bar);
          slide.appendChild(wrap);
          if (item.title) { const cap = document.createElement('div'); cap.className = 'slide-caption'; cap.textContent = item.title; slide.appendChild(cap); }

          slide.style.cssText += '; flex: 0 0 72%; overflow: hidden; border-radius: 8px;';

          vid.style.cssText = 'width:100%; height:100%; object-fit:cover; border-radius:8px; box-shadow:0 12px 40px rgba(0,0,0,0.25); display:block;';

        } else {

          if (item.title) { const cap = document.createElement('div'); cap.className = 'slide-caption'; cap.textContent = item.title; slide.appendChild(cap); }

    function openScene(name) {
      if (currentOpen && currentOpen !== name) closeScene();
      currentOpen = name;
      buildSlides(name);
      scene.classList.add('open');
      document.getElementById('polaroid').classList.add('polaroid-hidden');
    }

    function closeScene() {
      scene.classList.remove('open');
      track.querySelectorAll('video').forEach(v => v.pause());
      currentOpen = null;
      document.getElementById('polaroid').classList.remove('polaroid-hidden');
    }

    document.getElementById('navPrev').addEventListener('click', () => goTo(currentSlide - 1));

    const balls = {

    };

    function handleBallAction(name, b) {
      if (currentOpen === name) {
        closeScene();
        b.ball.style.opacity = '0';
        b.ball.classList.remove('drop');
        setTimeout(() => {
          b.ball.classList.add('drop');
          b.label.classList.add('show');
          new Audio('Paper Ball drop.wav').play().catch(() => {});
        }, 80);
      } else {
        b.label.classList.remove('show');
        new Audio('paper ball sound.mp3').play().catch(() => {});
        setTimeout(() => {
          b.ball.style.opacity = '0';
          b.mid.style.opacity = '1';
          b.mid.style.transform = 'scale(1) rotate(-5deg)';
        }, 200);
        setTimeout(() => {
          b.mid.style.opacity = '0';
          openScene(name);
        }, 500);
      }
    }

    function playDragSound() {
      const snd = new Audio('334200__wasabiwielder__paper-crumple-3.wav');
      snd.volume = 0.6;
      snd.play().catch(() => {});
    }

    // ── Universal drag + tap for balls (mouse AND touch) ──
    Object.entries(balls).forEach(([name, b]) => {
      setTimeout(() => {
        b.ball.classList.add('drop');
        setTimeout(() => b.label.classList.add('show'), 900);
        new Audio('Paper Ball drop.wav').play().catch(() => {});
      }, b.delay);

      let isDragging = false, didMove = false;
      let startX, startY, origLeft, origTop;
      const DRAG_THRESHOLD = 5;

      function onStart(clientX, clientY) {
        isDragging = true;
        didMove = false;
        startX = clientX;
        startY = clientY;
        origLeft = b.wrap.offsetLeft;
        origTop  = b.wrap.offsetTop;
        b.wrap.style.transition = 'none';
      }

      function onMove(clientX, clientY) {
        if (!isDragging) return;
        const dx = clientX - startX;
        const dy = clientY - startY;
        if (!didMove && (Math.abs(dx) > DRAG_THRESHOLD || Math.abs(dy) > DRAG_THRESHOLD)) {
          didMove = true;
          playDragSound();
          b.label.classList.remove('show');
        }
        if (didMove) {
          b.wrap.style.left = (origLeft + dx) + 'px';
          b.wrap.style.top  = (origTop  + dy) + 'px';
        }
      }

      function onEnd() {
        if (!isDragging) return;
        isDragging = false;
        if (didMove) {
          if (currentOpen !== name) b.label.classList.add('show');
        } else {
          handleBallAction(name, b);
        }
      }

      // Mouse
      b.hit.addEventListener('mousedown', (e) => { onStart(e.clientX, e.clientY); e.preventDefault(); });
      document.addEventListener('mousemove', (e) => onMove(e.clientX, e.clientY));
      document.addEventListener('mouseup', onEnd);

      // Touch
      b.hit.addEventListener('touchstart', (e) => {
        const t = e.touches[0];
        onStart(t.clientX, t.clientY);
        e.preventDefault();
      }, { passive: false });

      b.hit.addEventListener('touchmove', (e) => {
        const t = e.touches[0];
        onMove(t.clientX, t.clientY);
        e.preventDefault();
      }, { passive: false });

      b.hit.addEventListener('touchend', onEnd);
    });

    // ── Universal draggable for white balls + pen (mouse + touch) ──
    function makeUniversalDraggable(el) {
      let dragging = false, soundPlayed = false;
      let startX, startY, origLeft, origTop;

      function onStart(clientX, clientY) {
        dragging = true;
        soundPlayed = false;
        startX = clientX;
        startY = clientY;
        origLeft = el.offsetLeft;
        origTop  = el.offsetTop;
        el.style.transition = 'none';
      }

      function onMove(clientX, clientY) {
        if (!dragging) return;
        const dx = clientX - startX;
        const dy = clientY - startY;
        if (!soundPlayed && (Math.abs(dx) > 3 || Math.abs(dy) > 3)) {
          soundPlayed = true;
          playDragSound();
        }
        el.style.left = (origLeft + dx) + 'px';
        el.style.top  = (origTop  + dy) + 'px';
      }

      function onEnd() {
        if (!dragging) return;
        dragging = false;
      }

      el.addEventListener('mousedown', (e) => { onStart(e.clientX, e.clientY); e.preventDefault(); });
      document.addEventListener('mousemove', (e) => onMove(e.clientX, e.clientY));
      document.addEventListener('mouseup', onEnd);

      el.addEventListener('touchstart', (e) => { const t = e.touches[0]; onStart(t.clientX, t.clientY); e.preventDefault(); }, { passive: false });
      el.addEventListener('touchmove',  (e) => { const t = e.touches[0]; onMove(t.clientX, t.clientY); e.preventDefault(); }, { passive: false });
      el.addEventListener('touchend', onEnd);
    }

    makeUniversalDraggable(document.getElementById('whiteBallSmall'));
    makeUniversalDraggable(document.getElementById('whiteBallLarge'));

    // ── Carousel touch swipe ──
    let touchStartX = 0;
    track.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
    track.addEventListener('touchend', (e) => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 40) {
        if (dx < 0) goTo(currentSlide + 1);
        else goTo(currentSlide - 1);
      }
    });

    // ── Lightbox ──
    let _lbPhotos = [], _lbIdx = 0;

    function openLightbox(src, photos, idx) {
      _lbPhotos = photos && photos.length ? photos : [src];
      _lbIdx    = idx !== undefined ? idx : 0;
      _renderLightbox();
      document.getElementById('photoLightbox').style.display = 'flex';
    }

    function _renderLightbox() {
      document.getElementById('lightboxImg').src = _lbPhotos[_lbIdx];
      const ctr = document.getElementById('lbCounter');
      if (_lbPhotos.length > 1) ctr.textContent = (_lbIdx + 1) + ' / ' + _lbPhotos.length;
      else ctr.textContent = '';
      document.getElementById('lbPrev').style.display = _lbPhotos.length > 1 ? 'flex' : 'none';
      document.getElementById('lbNext').style.display = _lbPhotos.length > 1 ? 'flex' : 'none';
    }

      document.getElementById('photoLightbox').style.display = 'none';
      document.getElementById('lightboxImg').src = '';
    }

    // ── Drawing canvas ──
    const drawCanvas = document.getElementById('drawCanvas');
    const drawCtx    = drawCanvas.getContext('2d');
    let drawMode = false, isDrawing = false;

    function resizeDrawCanvas() {
      const tmp = drawCtx.getImageData(0, 0, drawCanvas.width, drawCanvas.height);
      drawCanvas.width  = window.innerWidth;
      drawCanvas.height = window.innerHeight;
      drawCtx.putImageData(tmp, 0, 0);
    }
    resizeDrawCanvas();
    window.addEventListener('resize', resizeDrawCanvas);

    function setDrawMode(on) {
      drawMode = on;
      drawCanvas.style.pointerEvents = 'none';
      const penEl = document.getElementById('penDeco');
      if (!penEl) return;
      penEl.style.cursor = on ? 'crosshair' : 'grab';
      penEl.style.filter = on
        ? 'drop-shadow(0 0 8px rgba(215,38,56,0.9)) drop-shadow(4px 16px 10px rgba(0,0,0,0.30))'
        : 'drop-shadow(4px 16px 10px rgba(0,0,0,0.30))';
    }

    const penEl = document.getElementById('penDeco');
    if (penEl) {
      let penDown = false, penSoundPlayed = false;
      let penStartX, penStartY, penOrigLeft, penOrigTop;

      penEl.addEventListener('dblclick', (e) => { e.preventDefault(); setDrawMode(!drawMode); });

      penEl.addEventListener('mousedown', (e) => {
        penDown = true; penSoundPlayed = false;
        penStartX = e.clientX; penStartY = e.clientY;
        penOrigLeft = penEl.offsetLeft; penOrigTop = penEl.offsetTop;
        penEl.style.transition = 'none';
        if (drawMode) { drawCtx.beginPath(); drawCtx.moveTo(e.clientX, e.clientY); }
        e.preventDefault();
      });

      document.addEventListener('mousemove', (e) => {
        if (!penDown) return;
        const dx = e.clientX - penStartX, dy = e.clientY - penStartY;
        if (!penSoundPlayed && (Math.abs(dx) > 3 || Math.abs(dy) > 3)) { penSoundPlayed = true; playDragSound(); }
        penEl.style.left = (penOrigLeft + dx) + 'px';
        penEl.style.top  = (penOrigTop  + dy) + 'px';
        if (drawMode) {
          drawCtx.strokeStyle = '#1c1c1c'; drawCtx.lineWidth = 3;
          drawCtx.lineCap = 'round'; drawCtx.lineJoin = 'round'; drawCtx.globalAlpha = 0.88;
          drawCtx.lineTo(e.clientX, e.clientY); drawCtx.stroke();
          drawCtx.beginPath(); drawCtx.moveTo(e.clientX, e.clientY);
        }
      });

      document.addEventListener('mouseup', () => { if (penDown) { penDown = false; } });
    }

    // ── Polaroid ──
    const polaroid      = document.getElementById('polaroid');
    const polaroidModal = document.getElementById('polaroidModal');
    const polaroidClose = document.getElementById('polaroidClose');
    const polaroidInner = document.getElementById('polaroidInner');

    function openPolaroidModal() {
      polaroidModal.classList.add('open');
      polaroidInner.style.animation = 'none';
      void polaroidInner.offsetWidth;
      polaroidInner.style.animation = 'swingOpen 0.7s cubic-bezier(0.34,1.2,0.64,1) forwards';
    }
    function closePolaroidModal() { polaroidModal.classList.remove('open'); }

    polaroidClose.addEventListener('click', (e) => { e.stopPropagation(); closePolaroidModal(); });
    polaroidModal.addEventListener('click', (e) => { if (e.target === polaroidModal) closePolaroidModal(); });

    let _down = false, _moved = false, _mx, _my, _l0, _t0;

    function polaroidStart(clientX, clientY) {
      _down = true; _moved = false;
      _mx = clientX; _my = clientY;
      const cs = window.getComputedStyle(polaroid);
      _l0 = parseFloat(cs.left); _t0 = parseFloat(cs.top);
      polaroid.style.left = _l0 + 'px'; polaroid.style.top = _t0 + 'px';
    }

    function polaroidMove(clientX, clientY) {
      if (!_down) return;
      const dx = clientX - _mx, dy = clientY - _my;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) { if (!_moved) playDragSound(); _moved = true; }
      if (_moved) {
        polaroid.style.left = (_l0 + dx) + 'px';
        polaroid.style.top  = (_t0 + dy) + 'px';
        polaroid.style.cursor = 'grabbing';
      }
    }

    function polaroidEnd() {
      if (!_down) return;
      _down = false;
      polaroid.style.cursor = 'pointer';
      if (!_moved) openPolaroidModal();
    }

    polaroid.addEventListener('mousedown', (e) => { polaroidStart(e.clientX, e.clientY); e.preventDefault(); });
    document.addEventListener('mousemove', (e) => polaroidMove(e.clientX, e.clientY));
    document.addEventListener('mouseup', polaroidEnd);

    polaroid.addEventListener('touchstart', (e) => { const t = e.touches[0]; polaroidStart(t.clientX, t.clientY); e.preventDefault(); }, { passive: false });
    polaroid.addEventListener('touchmove',  (e) => { const t = e.touches[0]; polaroidMove(t.clientX, t.clientY); e.preventDefault(); }, { passive: false });
    polaroid.addEventListener('touchend', polaroidEnd);

    // ── Keyboard ──
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeLightbox(); closePolaroidModal();
        drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
      }
      const lb = document.getElementById('photoLightbox');
      if (lb.style.display === 'flex') {
        if (e.key === 'ArrowRight') { _lbIdx = Math.min(_lbPhotos.length - 1, _lbIdx + 1); _renderLightbox(); }
        if (e.key === 'ArrowLeft')  { _lbIdx = Math.max(0, _lbIdx - 1); _renderLightbox(); }
      }
    });

    // Lightbox events
    document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
    document.getElementById('photoLightbox').addEventListener('click', (e) => { if (e.target === document.getElementById('photoLightbox')) closeLightbox(); });
    document.getElementById('lbPrev').addEventListener('click', (e) => { e.stopPropagation(); _lbIdx = Math.max(0, _lbIdx - 1); _renderLightbox(); });
    document.getElementById('lbNext').addEventListener('click', (e) => { e.stopPropagation(); _lbIdx = Math.min(_lbPhotos.length - 1, _lbIdx + 1); _renderLightbox(); });

    function drawGrain() {
      const canvas = document.querySelector('.grain');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const w = canvas.width  = window.innerWidth;
      const h = canvas.height = window.innerHeight;
      const grainSize = 2;
      for (let y = 0; y < h; y += grainSize) {
        for (let x = 0; x < w; x += grainSize) {
          const tone = 180 + Math.floor(Math.random() * 75);
          ctx.fillStyle = `rgba(${tone},${tone},${tone},0.25)`;
          ctx.fillRect(x, y, grainSize, grainSize);
        }
      }
    }
    drawGrain();
    window.addEventListener('resize', drawGrain);
  </script>
</body>
</html>
