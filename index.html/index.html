<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>By Razia</title>
  <link rel="stylesheet" href="https://use.typekit.net/ogu1wcx.css">
  <style>
    * {
      -webkit-tap-highlight-color: transparent;
      tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      margin: 0;
      padding: 0;
      background: #B3CDE0;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      touch-action: none;
    }

    .canvas {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #B3CDE0;
      overflow: hidden;
    }

    .title {
      font-size: 72px;
      font-weight: 500;
      font-family: 'auger-mono', monospace;
      color: #D72638;
      letter-spacing: -0.05em;
      line-height: 1;
      white-space: nowrap;
      margin: 0 0 1.5rem 0;
      opacity: 0;
      transform: translateX(-40px);
      animation: fromLeft 0.9s ease forwards;
      animation-delay: 500ms;
    }

    .desc {
      font-size: 13px;
      line-height: 1.7;
      color: #000;
      font-family: 'auger-mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      opacity: 0;
      transform: translateX(-40px);
      animation: fromLeft 0.9s ease forwards;
      animation-delay: 650ms;
    }

    .ball-label {
      font-family: 'auger-mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #2a3a4a;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
      text-align: center;
      margin-top: 10px;
      display: block;
    }

    .ball-label.show { opacity: 1; }

    @keyframes fromLeft {
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes dropBounce {
      0%   { opacity: 0; transform: translateY(-120%) rotate(-12deg); }
      55%  { opacity: 1; transform: translateY(6%) rotate(4deg); }
      72%  { transform: translateY(-3%) rotate(-2deg); }
      86%  { transform: translateY(3%) rotate(1deg); }
      100% { opacity: 1; transform: translateY(0) rotate(0deg); }
    }

    @keyframes dropBounceTilted {
      0%   { opacity: 0; transform: translateY(-120%) rotate(-22deg); }
      55%  { opacity: 1; transform: translateY(6%) rotate(-10deg); }
      72%  { transform: translateY(-3%) rotate(-16deg); }
      86%  { transform: translateY(3%) rotate(-13deg); }
      100% { opacity: 1; transform: translateY(0) rotate(-15deg); }
    }

    @keyframes stripOpen {
      0%   { opacity: 0; transform: scale(0.1) rotate(-8deg); }
      50%  { opacity: 1; transform: scale(1.03) rotate(1deg); }
      75%  { transform: scale(0.98) rotate(-0.5deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    @keyframes swingOpen {
      0%   { opacity: 0; transform: rotate(-15deg) scale(0.85); transform-origin: top center; }
      55%  { transform: rotate(4deg) scale(1.02); transform-origin: top center; }
      75%  { transform: rotate(-2deg) scale(0.99); transform-origin: top center; }
      100% { opacity: 1; transform: rotate(0deg) scale(1); transform-origin: top center; }
    }

    .left-panel {
      position: absolute;
      top: 0;
      left: 0;
      padding: 3rem 2rem 2rem 3rem;
      display: flex;
      flex-direction: column;
      z-index: 2;
      pointer-events: none;
    }

    .pball {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      filter: drop-shadow(0px 18px 12px rgba(0,0,0,0.28));
    }

    .pball.drop {
      animation: dropBounce 1s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
    }

    .pmidway {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.3s ease;
      filter: drop-shadow(0px 14px 10px rgba(0,0,0,0.22));
    }

    .grain {
      pointer-events: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 9999;
      opacity: 0.22;
    }

    .polaroid-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 99999;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(0,0,0,0.35);
      touch-action: auto;
    }
    .polaroid-modal.open { display: flex; }

    .polaroid-modal-inner {
      position: relative;
      animation: swingOpen 0.7s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
    }

    .polaroid-modal-inner img {
      max-width: 72vw;
      max-height: 82vh;
      display: block;
      border-radius: 4px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.5);
    }

    .polaroid-modal-close {
      position: absolute;
      top: -36px;
      right: 0;
      font-family: 'auger-mono', monospace;
      font-size: 11px;
      color: #fff;
      letter-spacing: 0.1em;
      cursor: pointer;
      background: none;
      border: none;
      opacity: 0.7;
    }

    .paper-scene {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      touch-action: auto;
    }

    .paper-scene.open { display: flex; }

    .paper-sheet {
      position: relative;
      width: 88vw;
      height: 76vh;
      background-image: url('Brown paper.jpg');
      background-size: cover;
      background-position: center;
      border-radius: 12px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.35);
      animation: stripOpen 0.65s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
      opacity: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-bottom: 80px;
      box-sizing: border-box;
      touch-action: auto;
    }

    .paper-viewport {
      width: 90%;
      height: 82%;
      overflow: hidden;
      position: relative;
      touch-action: pan-x;
    }

    .paper-track {
      display: flex;
      height: 100%;
      transition: transform 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
      gap: 24px;
      align-items: center;
    }

    .paper-slide {
      flex: 0 0 72%;
      height: 90%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      opacity: 0.35;
      transition: opacity 0.4s ease;
      pointer-events: none;
      position: relative;
    }

    .paper-slide.active {
      opacity: 1;
      pointer-events: all;
    }

    .slide-caption {
      font-family: 'auger-mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #3a2010;
      opacity: 0.75;
      text-align: center;
      flex-shrink: 0;
    }

    .polaroid-hidden {
      opacity: 0 !important;
      pointer-events: none !important;
    }

    .coming-soon {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      gap: 16px;
    }

    .coming-soon-text {
      font-family: 'auger-mono', monospace;
      font-size: 18px;
      color: #5a3a1a;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.6;
    }

    .coming-soon-sub {
      font-family: 'auger-mono', monospace;
      font-size: 11px;
      color: #7a5a3a;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.45;
    }

    .carousel-nav {
      position: absolute;
      bottom: 3%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 24px;
      touch-action: auto;
    }

    .nav-arrow {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(255,255,255,0.8);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease, transform 0.15s ease;
      box-shadow: 0 2px 12px rgba(0,0,0,0.14);
      touch-action: auto;
    }

    .nav-arrow svg {
      width: 16px;
      height: 16px;
      stroke: #2a1a0a;
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .slide-counter {
      font-family: 'auger-mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: #5a3a1a;
      opacity: 0.7;
      min-width: 36px;
      text-align: center;
    }

    .paper-close {
      position: absolute;
      top: 14px;
      right: 18px;
      font-family: 'auger-mono', monospace;
      font-size: 11px;
      color: #3a2010;
      letter-spacing: 0.1em;
      cursor: pointer;
      background: none;
      border: none;
      opacity: 0.6;
      z-index: 10;
      touch-action: auto;
    }

    .series-back {
      position: absolute;
      top: 14px;
      left: 18px;
      font-family: 'auger-mono', monospace;
      font-size: 11px;
      color: #3a2010;
      letter-spacing: 0.1em;
      cursor: pointer;
      background: none;
      border: none;
      opacity: 0.6;
      z-index: 10;
      touch-action: auto;
    }

    .pdf-viewer {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 300;
      align-items: center;
      justify-content: center;
      touch-action: auto;
    }

    .pdf-viewer.open { display: flex; }

    .pdf-viewer iframe {
      width: 90vw;
      height: 92vh;
      border: none;
      border-radius: 4px;
    }

    .pdf-viewer-close {
      position: absolute;
      top: 20px;
      right: 24px;
      font-family: 'auger-mono', monospace;
      font-size: 13px;
      color: #fff;
      letter-spacing: 0.1em;
      cursor: pointer;
      background: none;
      border: none;
      opacity: 0.7;
      touch-action: auto;
    }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      .left-panel { padding: 1.8rem 1.2rem 1rem 1.4rem; }
      .title { font-size: 38px; white-space: normal; }
      .desc { font-size: 10px; line-height: 1.6; }

      #designWrap { left: 5% !important; top: 36% !important; }
      #designWrap #designHit { width: 100px !important; height: 100px !important; }
      #designBall { width: 100px !important; }
      #designMid  { width: 100px !important; }

      #videoWrap { left: 50% !important; top: 62% !important; transform: translateX(-50%); }
      #videoWrap #videoHitWrap { width: 180px !important; height: 180px !important; }
      #videoBall { width: 100% !important; }
      #videoMid  { width: 100% !important; }

      #photoWrap { left: auto !important; right: 5% !important; top: 36% !important; }
      #photoWrap #photoHitWrap { width: 80px !important; height: 80px !important; }
      #photoBall { width: 80px !important; }
      #photoMid  { width: 80px !important; }

      #penDeco {
        display: block !important;
        width: 28% !important;
        left: 60% !important;
        top: 6% !important;
        transform: rotate(-7deg) !important;
        opacity: 1 !important;
        animation: none !important;
      }

      #whiteBallSmall {
        width: 7% !important;
        left: 38% !important;
        top: 38% !important;
        opacity: 1 !important;
        animation: none !important;
      }

      #whiteBallLarge {
        width: 16% !important;
        left: 5% !important;
        top: 70% !important;
        opacity: 1 !important;
        animation: none !important;
      }

      #polaroid {
        left: 55% !important;
        top: 78% !important;
        width: 30% !important;
        opacity: 1 !important;
        animation: none !important;
      }

      .paper-sheet { width: 96vw !important; height: 88vh !important; padding-bottom: 70px !important; }
      .paper-viewport { width: 95% !important; height: 78% !important; }
      .paper-slide { flex: 0 0 88% !important; }
      .nav-arrow { width: 52px !important; height: 52px !important; }
      .nav-arrow svg { width: 20px !important; height: 20px !important; }
      .pdf-viewer iframe { width: 98vw !important; height: 88vh !important; }
      #lightboxImg { max-width: 96vw !important; max-height: 80vh !important; }
      .polaroid-modal-inner img { max-width: 90vw !important; max-height: 80vh !important; }
      .ball-label { font-size: 9px !important; }
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="left-panel">
      <h1 class="title">BY RAZIA</h1>
      <p class="desc">
        RADHIA ADAM IS AN ARTIST,<br>
        DESIGNER AND CAMERA GIRL,<br>
        BASED IN WASHINGTON<br>
        D.C. BORN IN TANZANIA.
      </p>
    </div>

    <img id="penDeco" src="pen.png" aria-hidden="true"
      style="position:absolute; left:30%; top:-50%; width:72%; transform:rotate(-7deg); transform-origin:center center; pointer-events:auto; z-index:4; cursor:grab; opacity:0; animation:fadeIn 0.9s ease forwards; animation-delay:1400ms; filter:drop-shadow(4px 16px 10px rgba(0,0,0,0.30));">

    <div id="designWrap" style="position:absolute; left:11%; top:52%; display:flex; flex-direction:column; align-items:center; z-index:6; touch-action:none;">
      <div id="designHit" style="position:relative; width:160px; height:160px; display:flex; align-items:center; justify-content:center; touch-action:none;">
        <img id="designBall" class="pball" src="paper_ball_graphic.png" alt="design ball" style="width:160px; position:absolute;"/>
        <img id="designMid" class="pmidway" src="mid_way_paper_ball.png" alt="midway" style="width:160px; position:absolute; transform:scale(0.3) rotate(15deg);"/>
      </div>
      <span class="ball-label" id="designLabel">Design</span>
    </div>

    <img id="whiteBallSmall" src="White paper ball.png" aria-hidden="true"
      style="position:absolute; left:23%; top:56%; width:4%; pointer-events:auto; z-index:5; cursor:grab; touch-action:none; opacity:0; animation:dropBounce 1s cubic-bezier(0.34,1.2,0.64,1) forwards; animation-delay:1800ms; filter:drop-shadow(2px 8px 6px rgba(0,0,0,0.28));">

    <div id="videoWrap" style="position:absolute; left:44%; top:35%; display:flex; flex-direction:column; align-items:center; z-index:6; touch-action:none;">
      <div id="videoHitWrap" style="position:relative; width:300px; height:300px; display:flex; align-items:center; justify-content:center; touch-action:none;">
        <img id="videoBall" class="pball" src="paper_ball_graphic.png" alt="video ball" style="width:100%;"/>
        <img id="videoMid" class="pmidway" src="mid_way_paper_ball.png" alt="midway" style="width:100%; transform:scale(0.3) rotate(15deg);"/>
      </div>
      <span class="ball-label" id="videoLabel">Video</span>
    </div>

    <div id="photoWrap" style="position:absolute; left:76%; top:38%; display:flex; flex-direction:column; align-items:center; z-index:6; touch-action:none;">
      <div id="photoHitWrap" style="position:relative; width:120px; height:120px; display:flex; align-items:center; justify-content:center; touch-action:none;">
        <img id="photoBall" class="pball" src="paper_ball_graphic.png" alt="photo ball" style="width:120px;"/>
        <img id="photoMid" class="pmidway" src="mid_way_paper_ball.png" alt="midway" style="width:120px; transform:scale(0.3) rotate(15deg);"/>
      </div>
      <span class="ball-label" id="photoLabel">Photo</span>
    </div>

    <img id="whiteBallLarge" src="White paper ball.png" aria-hidden="true"
      style="position:absolute; left:68%; top:66%; width:10%; pointer-events:auto; z-index:5; cursor:grab; touch-action:none; opacity:0; animation:dropBounce 1s cubic-bezier(0.34,1.2,0.64,1) forwards; animation-delay:2200ms; filter:drop-shadow(4px 16px 12px rgba(0,0,0,0.30));">
  </div>

  <canvas class="grain"></canvas>

  <img id="polaroid" src="MY IMAGE.png" alt="polaroid"
    style="position:fixed; left:26%; top:66%; width:18%; transform-origin:center top; pointer-events:auto; z-index:10001; cursor:pointer; touch-action:none; opacity:0; animation:dropBounceTilted 1s cubic-bezier(0.34,1.2,0.64,1) forwards; animation-delay:2600ms; filter:drop-shadow(4px 20px 16px rgba(0,0,0,0.40));">

  <div class="polaroid-modal" id="polaroidModal">
    <div class="polaroid-modal-inner" id="polaroidInner" style="position:relative;">
      <button class="polaroid-modal-close" id="polaroidClose">✕ CLOSE</button>
      <img src="IMAGE OF ME 2.png" alt="Portrait" style="display:block;">
      <a href="mailto:adamradhia1@gmail.com" title="Email Radhia"
         style="position:absolute; bottom:9%; left:18%; right:5%; height:9%; cursor:pointer; display:block; border-radius:4px;"></a>
    </div>
  </div>

  <div id="photoLightbox" style="display:none; position:fixed; inset:0; background:rgba(180,200,220,0.18); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px); z-index:99998; align-items:center; justify-content:center; touch-action:auto;">
    <button id="lbPrev" style="position:absolute; left:24px; top:50%; transform:translateY(-50%); width:48px; height:48px; border-radius:50%; background:rgba(255,255,255,0.55); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; touch-action:auto;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <img id="lightboxImg" src="" alt="" style="max-width:82vw; max-height:88vh; object-fit:contain; border-radius:12px; box-shadow:0 30px 80px rgba(0,0,0,0.25); display:block;">
    <button id="lbNext" style="position:absolute; right:24px; top:50%; transform:translateY(-50%); width:48px; height:48px; border-radius:50%; background:rgba(255,255,255,0.55); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; touch-action:auto;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <button id="lightboxClose" style="position:absolute; top:20px; right:24px; font-family:'auger-mono',monospace; font-size:13px; color:#1a1a1a; letter-spacing:0.1em; cursor:pointer; background:rgba(255,255,255,0.55); border:none; padding:6px 12px; border-radius:20px; opacity:0.85; touch-action:auto;">✕ CLOSE</button>
    <span id="lbCounter" style="position:absolute; bottom:20px; left:50%; transform:translateX(-50%); font-family:'auger-mono',monospace; font-size:11px; color:#1a1a1a; letter-spacing:0.1em; opacity:0.6;"></span>
  </div>

  <canvas id="drawCanvas" style="position:fixed; inset:0; z-index:199999; pointer-events:none; cursor:crosshair;"></canvas>

  <div class="paper-scene" id="paperScene">
    <div class="paper-sheet">
      <button class="paper-close" id="paperClose">✕ CLOSE</button>
      <button class="series-back" id="seriesBack" style="display:none;">← BACK</button>
      <div class="paper-viewport">
        <div class="paper-track" id="paperTrack"></div>
      </div>
      <div class="carousel-nav">
        <button class="nav-arrow" id="navPrev">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="slide-counter" id="slideCounter">1 / 1</span>
        <button class="nav-arrow" id="navNext">
          <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="pdf-viewer" id="pdfViewer">
    <button class="pdf-viewer-close" id="pdfViewerClose">✕ CLOSE</button>
    <iframe id="pdfFrame" src="" title="PDF viewer"></iframe>
  </div>

  <script>
    // ── Mobile detection ──
    const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

    // Force mobile elements visible immediately
    if (isMobile) {
      window.addEventListener('DOMContentLoaded', () => {
        const overrides = [
          { id: 'penDeco',        styles: { animation:'none', opacity:'1', top:'6%', left:'60%', width:'28%', transform:'rotate(-7deg)' } },
          { id: 'whiteBallSmall', styles: { animation:'none', opacity:'1', left:'38%', top:'38%', width:'7%' } },
          { id: 'whiteBallLarge', styles: { animation:'none', opacity:'1', left:'5%',  top:'70%', width:'16%' } },
          { id: 'polaroid',       styles: { animation:'none', opacity:'1', left:'55%', top:'78%', width:'30%' } },
        ];
        overrides.forEach(({ id, styles }) => {
          const el = document.getElementById(id);
          if (el) Object.assign(el.style, styles);
        });
      });
    }

    const scene     = document.getElementById('paperScene');
    const track     = document.getElementById('paperTrack');
    const closeBtn  = document.getElementById('paperClose');
    const counter   = document.getElementById('slideCounter');
    const pdfViewer = document.getElementById('pdfViewer');
    const pdfFrame  = document.getElementById('pdfFrame');
    const pdfVClose = document.getElementById('pdfViewerClose');

    let currentOpen  = null;
    let currentSlide = 0;
    let slides       = [];

    const content = {
      video: [
        { type: 'youtube', src: 'https://www.youtube.com/embed/wO9s3tcu3qs', title: 'Kamala Rally' },
        { type: 'video-thumb', preview: 'https://img.youtube.com/vi/Tqk0LoxsA_Q/maxresdefault.jpg', href: 'https://youtu.be/Tqk0LoxsA_Q', title: 'Video 2' },
        { type: 'video-thumb', preview: 'https://img.youtube.com/vi/hzevMrX6kXo/maxresdefault.jpg', href: 'https://youtu.be/hzevMrX6kXo', title: 'Video 3' },
        { type: 'video-thumb', preview: 'https://img.youtube.com/vi/NPWKfqRxe8U/maxresdefault.jpg', href: 'https://youtu.be/NPWKfqRxe8U', title: 'Video 4' },
        { type: 'video-thumb', preview: 'https://img.youtube.com/vi/_ggIsdSxNqk/maxresdefault.jpg', href: 'https://youtu.be/_ggIsdSxNqk', title: 'Video 5' },
        { type: 'video-thumb', preview: 'https://img.youtube.com/vi/dQwXXr3yKA4/maxresdefault.jpg', href: 'https://www.youtube.com/watch?v=dQwXXr3yKA4&t=5s', title: 'Video 6' },

    function setActiveSlide() {
      document.querySelectorAll('.paper-slide').forEach((s, i) => s.classList.toggle('active', i === currentSlide));
      counter.textContent = (currentSlide + 1) + ' / ' + slides.length;
      track.style.transform = `translateX(${centeredOffset(currentSlide)}px)`;
    }

    function centeredOffset(idx) {
      const vpW = track.parentElement.offsetWidth;
      const slideW = vpW * 0.72 + 24;
      return (vpW - vpW * 0.72) / 2 - idx * slideW;
    }

    function goTo(idx) {
      currentSlide = Math.max(0, Math.min(idx, slides.length - 1));
      track.style.transform = `translateX(${centeredOffset(currentSlide)}px)`;
      setActiveSlide();
    }

    const seriesBackBtn = document.getElementById('seriesBack');

    function buildSeriesCovers(seriesArray) {
      slides = seriesArray;
      currentSlide = 0;
      track.innerHTML = '';
      track.style.transform = '';
      seriesBackBtn.style.display = 'none';
      seriesArray.forEach((item, idx) => {
        const slide = document.createElement('div');
        slide.className = 'paper-slide' + (idx === 0 ? ' active' : '');
        slide.style.cssText = 'flex:0 0 72%; display:flex; align-items:center; justify-content:center;';
        const card = document.createElement('div');
        card.style.cssText = 'position:relative; width:260px; height:380px; border-radius:10px; overflow:hidden; cursor:pointer; box-shadow:0 16px 50px rgba(0,0,0,0.28);';
        const coverImg = document.createElement('img');
        coverImg.src = item.cover; coverImg.alt = item.name;
        coverImg.style.cssText = 'width:100%; height:100%; object-fit:cover; display:block;';
        const tint = document.createElement('div');
        tint.style.cssText = 'position:absolute; inset:0; background:rgba(0,0,0,0.18);';
        const badge = document.createElement('div');
        badge.style.cssText = 'position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(180,230,240,0.92); padding:8px 18px; white-space:nowrap; text-align:center;';
        badge.innerHTML = `<div style="font-family:'auger-mono',monospace;font-size:13px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#111;">${item.name}</div><div style="font-family:'auger-mono',monospace;font-size:10px;letter-spacing:0.1em;color:#555;margin-top:3px;">${item.date}</div>`;
        card.appendChild(coverImg); card.appendChild(tint); card.appendChild(badge);
        card.addEventListener('click', () => { if (slide.classList.contains('active')) openSeriesPhotos(item); });
        slide.appendChild(card);
        track.appendChild(slide);
      });
      setActiveSlide();
    }

    function openSeriesPhotos(series) {
      slides = series.photos.map(src => ({ src }));
      currentSlide = 0;
      track.innerHTML = '';
      track.style.transform = '';
      seriesBackBtn.style.display = 'block';
      const photoSrcs = slides.map(s => s.src);
      slides.forEach((item, idx) => {
        const slide = document.createElement('div');
        slide.className = 'paper-slide' + (idx === 0 ? ' active' : '');
        slide.style.cssText = 'flex:0 0 72%; display:flex; align-items:center; justify-content:center;';
        const img = document.createElement('img');
        img.src = item.src; img.alt = item.src;
        img.style.cssText = 'max-width:100%; max-height:100%; object-fit:contain; border-radius:8px; box-shadow:0 12px 40px rgba(0,0,0,0.25); display:block;';
        img.addEventListener('click', () => openLightbox(item.src, photoSrcs, idx));
        slide.appendChild(img);
        track.appendChild(slide);
      });
      setActiveSlide();
    }

    seriesBackBtn.addEventListener('click', () => { if (currentOpen === 'photo') buildSeriesCovers(content.photo); });

    function buildSlides(name) {
      currentSlide = 0; track.innerHTML = ''; track.style.transform = '';
      seriesBackBtn.style.display = 'none';
      if (name === 'photo') { buildSeriesCovers(content.photo); return; }
      slides = content[name];
      slides.forEach((item, idx) => {
        const slide = document.createElement('div');
        slide.className = 'paper-slide' + (idx === 0 ? ' active' : '');
        if (item.type === 'youtube') {
          slide.style.cssText += 'flex:0 0 72%; overflow:hidden; border-radius:8px;';
          const frame = document.createElement('iframe');
          frame.src = item.src;
          frame.style.cssText = 'width:100%; height:100%; border:none; border-radius:8px; display:block;';
          frame.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
          frame.allowFullscreen = true;
          slide.appendChild(frame);
          if (item.title) { const cap = document.createElement('div'); cap.className = 'slide-caption'; cap.textContent = item.title; slide.appendChild(cap); }
        } else if (item.type === 'video-thumb') {
          slide.style.cssText += 'flex:0 0 72%; overflow:hidden; border-radius:8px; cursor:pointer;';
          const wrap = document.createElement('div');
          wrap.style.cssText = 'position:relative; width:100%; height:100%; border-radius:8px; overflow:hidden; box-shadow:0 12px 40px rgba(0,0,0,0.25);';
          wrap.addEventListener('click', () => window.open(item.href, '_blank'));
          const img = document.createElement('img');
          img.src = item.preview; img.alt = item.title;
          img.style.cssText = 'width:100%; height:100%; object-fit:cover; display:block;';
          wrap.appendChild(img);
          const bar = document.createElement('div');
          bar.style.cssText = 'position:absolute; bottom:0; left:0; right:0; height:52px; background:rgba(0,0,0,0.85); display:flex; align-items:center; padding:0 14px; gap:12px; box-sizing:border-box;';
          bar.innerHTML = `<svg width="42" height="30" viewBox="0 0 42 30" fill="none"><rect width="42" height="30" rx="6" fill="#FF0000"/><polygon points="16,8 16,22 30,15" fill="white"/></svg><span style="color:#fff;font-family:Roboto,Arial,sans-serif;font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${item.title}</span>`;
          wrap.appendChild(bar);
          slide.appendChild(wrap);
        } else if (item.type === 'full-image') {
          slide.style.cssText += 'flex:0 0 72%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; cursor:zoom-in;';
          const img = document.createElement('img');
          img.src = item.src; img.alt = item.title || '';
          img.style.cssText = 'max-width:100%; max-height:88%; object-fit:contain; border-radius:6px; box-shadow:0 12px 40px rgba(0,0,0,0.2); display:block;';
          img.addEventListener('click', () => openLightbox(item.src));
          slide.appendChild(img);
          if (item.title) { const cap = document.createElement('div'); cap.className = 'slide-caption'; cap.textContent = item.title; slide.appendChild(cap); }
        } else {
          slide.style.cssText += 'flex:0 0 72%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px;';
          const img = document.createElement('img');
          img.src = item.preview || item.src; img.alt = item.title || '';
          img.style.cssText = 'max-width:100%; max-height:88%; object-fit:contain; border-radius:6px; display:block; cursor:pointer; box-shadow:0 12px 40px rgba(0,0,0,0.18);';
          if (item.type === 'link') img.addEventListener('click', () => window.open(item.href, '_blank'));
          slide.appendChild(img);
          if (item.title) { const cap = document.createElement('div'); cap.className = 'slide-caption'; cap.textContent = item.title; slide.appendChild(cap); }
        }
        track.appendChild(slide);
      });
      setActiveSlide();
    }

    function openScene(name) {
      if (currentOpen && currentOpen !== name) closeScene();
      currentOpen = name; buildSlides(name);
      scene.classList.add('open');
      document.getElementById('polaroid').classList.add('polaroid-hidden');
    }

    function closeScene() {
      scene.classList.remove('open');
      track.querySelectorAll('video').forEach(v => v.pause());
      currentOpen = null;
      document.getElementById('polaroid').classList.remove('polaroid-hidden');
    }

    document.getElementById('navPrev').addEventListener('click', () => goTo(currentSlide - 1));
    document.getElementById('navNext').addEventListener('click', () => goTo(currentSlide + 1));
    closeBtn.addEventListener('click', closeScene);
    pdfVClose.addEventListener('click', () => { pdfViewer.classList.remove('open'); pdfFrame.src = ''; });
    pdfViewer.addEventListener('click', (e) => { if (e.target === pdfViewer) { pdfViewer.classList.remove('open'); pdfFrame.src = ''; } });

    // ── DRAG SYSTEM — handles both mouse and touch ──
    function playDragSound() {
      try { const s = new Audio('334200__wasabiwielder__paper-crumple-3.wav'); s.volume = 0.6; s.play(); } catch(e) {}
    }

    function makeDraggable(el, opts) {
      // opts: { onTap, getPos, setPos }
      let active = false, moved = false, soundPlayed = false;
      let x0, y0, elX0, elY0;
      const THRESH = 6;

      function getElPos() {
        if (opts.getPos) return opts.getPos();
        return { x: el.offsetLeft, y: el.offsetTop };
      }

      function setElPos(x, y) {
        if (opts.setPos) { opts.setPos(x, y); return; }
        el.style.left = x + 'px';
        el.style.top  = y + 'px';
      }

      function start(px, py) {
        active = true; moved = false; soundPlayed = false;
        x0 = px; y0 = py;
        const pos = getElPos();
        elX0 = pos.x; elY0 = pos.y;
      }

      function move(px, py) {
        if (!active) return;
        const dx = px - x0, dy = py - y0;
        if (!moved && Math.sqrt(dx*dx + dy*dy) > THRESH) {
          moved = true;
          if (!soundPlayed) { soundPlayed = true; playDragSound(); }
        }
        if (moved) setElPos(elX0 + dx, elY0 + dy);
      }

      function end() {
        if (!active) return;
        active = false;
        if (!moved && opts.onTap) opts.onTap();
      }

      // Mouse events
      el.addEventListener('mousedown', (e) => { start(e.clientX, e.clientY); e.preventDefault(); });
      window.addEventListener('mousemove', (e) => { if (active) move(e.clientX, e.clientY); });
      window.addEventListener('mouseup', end);

      // Touch events — attached to element, not document
      el.addEventListener('touchstart', (e) => {
        e.preventDefault();
        e.stopPropagation();
        const t = e.touches[0];
        start(t.clientX, t.clientY);
      }, { passive: false, capture: true });

      el.addEventListener('touchmove', (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (!active) return;
        const t = e.touches[0];
        move(t.clientX, t.clientY);
      }, { passive: false, capture: true });

      el.addEventListener('touchend', (e) => {
        e.preventDefault();
        e.stopPropagation();
        end();
      }, { passive: false, capture: true });

      el.addEventListener('touchcancel', () => { active = false; });
    }

    // ── Paper balls ──
    const balls = {
      design: { ball: document.getElementById('designBall'), mid: document.getElementById('designMid'), hit: document.getElementById('designHit'), wrap: document.getElementById('designWrap'), label: document.getElementById('designLabel'), delay: 1600 },
      video:  { ball: document.getElementById('videoBall'),  mid: document.getElementById('videoMid'),  hit: document.getElementById('videoHitWrap'), wrap: document.getElementById('videoWrap'),  label: document.getElementById('videoLabel'),  delay: 2000 },
      photo:  { ball: document.getElementById('photoBall'),  mid: document.getElementById('photoMid'),  hit: document.getElementById('photoHitWrap'), wrap: document.getElementById('photoWrap'),  label: document.getElementById('photoLabel'),  delay: 2400 },
    };

    function handleBallTap(name, b) {
      if (currentOpen === name) {
        closeScene();
        b.ball.style.opacity = '0'; b.ball.classList.remove('drop');
        setTimeout(() => { b.ball.classList.add('drop'); b.label.classList.add('show'); try { new Audio('Paper Ball drop.wav').play(); } catch(e){} }, 80);
      } else {
        b.label.classList.remove('show');
        try { new Audio('paper ball sound.mp3').play(); } catch(e){}
        setTimeout(() => { b.ball.style.opacity = '0'; b.mid.style.opacity = '1'; b.mid.style.transform = 'scale(1) rotate(-5deg)'; }, 200);
        setTimeout(() => { b.mid.style.opacity = '0'; openScene(name); }, 500);
      }
    }

    Object.entries(balls).forEach(([name, b]) => {
      setTimeout(() => {
        b.ball.classList.add('drop');
        setTimeout(() => b.label.classList.add('show'), 900);
        try { new Audio('Paper Ball drop.wav').play(); } catch(e){}
      }, b.delay);

      makeDraggable(b.hit, {
        onTap: () => handleBallTap(name, b),
        getPos: () => ({ x: b.wrap.offsetLeft, y: b.wrap.offsetTop }),
        setPos: (x, y) => {
          b.wrap.style.left = x + 'px';
          b.wrap.style.top  = y + 'px';
          b.label.classList.remove('show');
        }
      });
    });

    // ── White balls ──
    makeDraggable(document.getElementById('whiteBallSmall'), {});
    makeDraggable(document.getElementById('whiteBallLarge'), {});

    // ── Polaroid ──
    const polaroid      = document.getElementById('polaroid');
    const polaroidModal = document.getElementById('polaroidModal');
    const polaroidClose = document.getElementById('polaroidClose');
    const polaroidInner = document.getElementById('polaroidInner');

    function openPolaroidModal() {
      polaroidModal.classList.add('open');
      polaroidInner.style.animation = 'none';
      void polaroidInner.offsetWidth;
      polaroidInner.style.animation = 'swingOpen 0.7s cubic-bezier(0.34,1.2,0.64,1) forwards';
    }
    function closePolaroidModal() { polaroidModal.classList.remove('open'); }
    polaroidClose.addEventListener('click', (e) => { e.stopPropagation(); closePolaroidModal(); });
    polaroidModal.addEventListener('click', (e) => { if (e.target === polaroidModal) closePolaroidModal(); });

    makeDraggable(polaroid, {
      onTap: openPolaroidModal,
      getPos: () => {
        const cs = window.getComputedStyle(polaroid);
        return { x: parseFloat(cs.left), y: parseFloat(cs.top) };
      }
    });

    // ── Pen ──
    const penEl     = document.getElementById('penDeco');
    const drawCanvas = document.getElementById('drawCanvas');
    const drawCtx   = drawCanvas.getContext('2d');
    let drawMode    = false;
    let lastTap     = 0;

    function resizeDrawCanvas() {
      const tmp = drawCtx.getImageData(0, 0, drawCanvas.width, drawCanvas.height);
      drawCanvas.width = window.innerWidth; drawCanvas.height = window.innerHeight;
      drawCtx.putImageData(tmp, 0, 0);
    }
    resizeDrawCanvas();
    window.addEventListener('resize', resizeDrawCanvas);

    function setDrawMode(on) {
      drawMode = on;
      if (!penEl) return;
      penEl.style.filter = on
        ? 'drop-shadow(0 0 8px rgba(215,38,56,0.9)) drop-shadow(4px 16px 10px rgba(0,0,0,0.30))'
        : 'drop-shadow(4px 16px 10px rgba(0,0,0,0.30))';
    }

    if (penEl) {
      penEl.addEventListener('dblclick', (e) => { e.preventDefault(); setDrawMode(!drawMode); });

      let penActive = false, penMoved = false;
      let px0, py0, penElX0, penElY0;

      function penStart(cx, cy) {
        penActive = true; penMoved = false;
        px0 = cx; py0 = cy;
        penElX0 = penEl.offsetLeft; penElY0 = penEl.offsetTop;
        if (drawMode) { drawCtx.beginPath(); drawCtx.moveTo(cx, cy); }
      }

      function penMove(cx, cy) {
        if (!penActive) return;
        const dx = cx - px0, dy = cy - py0;
        if (!penMoved && Math.sqrt(dx*dx+dy*dy) > 4) penMoved = true;
        penEl.style.left = (penElX0 + dx) + 'px';
        penEl.style.top  = (penElY0 + dy) + 'px';
        if (drawMode) {
          drawCtx.strokeStyle = '#1c1c1c'; drawCtx.lineWidth = 3;
          drawCtx.lineCap = 'round'; drawCtx.lineJoin = 'round'; drawCtx.globalAlpha = 0.88;
          drawCtx.lineTo(cx, cy); drawCtx.stroke();
          drawCtx.beginPath(); drawCtx.moveTo(cx, cy);
        }
      }

      function penEnd() { penActive = false; }

      penEl.addEventListener('mousedown', (e) => { penStart(e.clientX, e.clientY); e.preventDefault(); });
      window.addEventListener('mousemove', (e) => { if (penActive) penMove(e.clientX, e.clientY); });
      window.addEventListener('mouseup', penEnd);

      penEl.addEventListener('touchstart', (e) => {
        e.preventDefault(); e.stopPropagation();
        const now = Date.now();
        if (now - lastTap < 300) setDrawMode(!drawMode);
        lastTap = now;
        penStart(e.touches[0].clientX, e.touches[0].clientY);
      }, { passive: false, capture: true });

      penEl.addEventListener('touchmove', (e) => {
        e.preventDefault(); e.stopPropagation();
        penMove(e.touches[0].clientX, e.touches[0].clientY);
      }, { passive: false, capture: true });

      penEl.addEventListener('touchend', (e) => {
        e.preventDefault(); e.stopPropagation();
        penEnd();
      }, { passive: false, capture: true });
    }

    // ── Carousel swipe ──
    let swipeX = 0;
    track.addEventListener('touchstart', (e) => { swipeX = e.touches[0].clientX; }, { passive: true });
    track.addEventListener('touchend', (e) => {
      const dx = e.changedTouches[0].clientX - swipeX;
      if (Math.abs(dx) > 40) dx < 0 ? goTo(currentSlide + 1) : goTo(currentSlide - 1);
    });

    // ── Lightbox ──
    let _lbPhotos = [], _lbIdx = 0;
    function openLightbox(src, photos, idx) {
      _lbPhotos = photos && photos.length ? photos : [src];
      _lbIdx = idx !== undefined ? idx : 0;
      _renderLightbox();
      document.getElementById('photoLightbox').style.display = 'flex';
    }
    function _renderLightbox() {
      document.getElementById('lightboxImg').src = _lbPhotos[_lbIdx];
      const ctr = document.getElementById('lbCounter');
      ctr.textContent = _lbPhotos.length > 1 ? (_lbIdx+1) + ' / ' + _lbPhotos.length : '';
      document.getElementById('lbPrev').style.display = _lbPhotos.length > 1 ? 'flex' : 'none';
      document.getElementById('lbNext').style.display = _lbPhotos.length > 1 ? 'flex' : 'none';
    }
    function closeLightbox() {
      document.getElementById('photoLightbox').style.display = 'none';
      document.getElementById('lightboxImg').src = '';
    }

    document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
    document.getElementById('photoLightbox').addEventListener('click', (e) => { if (e.target === document.getElementById('photoLightbox')) closeLightbox(); });
    document.getElementById('lbPrev').addEventListener('click', (e) => { e.stopPropagation(); _lbIdx = Math.max(0, _lbIdx-1); _renderLightbox(); });
    document.getElementById('lbNext').addEventListener('click', (e) => { e.stopPropagation(); _lbIdx = Math.min(_lbPhotos.length-1, _lbIdx+1); _renderLightbox(); });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { closeLightbox(); closePolaroidModal(); drawCtx.clearRect(0,0,drawCanvas.width,drawCanvas.height); }
      if (document.getElementById('photoLightbox').style.display === 'flex') {
        if (e.key === 'ArrowRight') { _lbIdx = Math.min(_lbPhotos.length-1, _lbIdx+1); _renderLightbox(); }
        if (e.key === 'ArrowLeft')  { _lbIdx = Math.max(0, _lbIdx-1); _renderLightbox(); }
      }
    });

    // ── Grain ──
    function drawGrain() {
      const canvas = document.querySelector('.grain');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const w = canvas.width = window.innerWidth;
      const h = canvas.height = window.innerHeight;
      for (let y = 0; y < h; y += 2) {
        for (let x = 0; x < w; x += 2) {
          const t = 180 + Math.floor(Math.random() * 75);
          ctx.fillStyle = `rgba(${t},${t},${t},0.25)`;
          ctx.fillRect(x, y, 2, 2);
        }
      }
    }
    drawGrain();
    window.addEventListener('resize', drawGrain);
  </script>
